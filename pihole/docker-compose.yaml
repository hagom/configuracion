services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    network_mode: "host"
    # IMPORTANTE: En modo host, Pi-hole usará el DNS del sistema operativo para arrancar.
    # Asegúrate de que tu Raspberry Pi tenga la hora correcta antes de iniciar.
    environment:
      - TZ=America/Caracas
      - FTLCONF_LOCAL_IPV4=192.168.1.120
      - DNSMASQ_LISTENING=all
      - MAXCONNV=1000000
      - PIHOLE_DNS_=127.0.0.1#5335
      - FTLCONF_misc_etc_dnsmasq_d=true
      - FTLCONF_dns_dnsmasq_dns_forward_max=1500
      - FTLCONF_DATABASE_SIZE=10000
      - FTLCONF_dns_cacheSIZE=10000
      - FTLCONF_LOGGING_LOG_QUERIES=false
      - FTLCONF_DEBUG_TCP=false
      - FTLCONF_DEBUG_UDP=false
      - FTLCONF_webserver_api_PORT=0
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - SYS_NICE
      - SYS_TIME
      - NET_ADMIN
    labels:
      - "homepage.group=Seguridad"
      - "homepage.name=Pi-hole"
      - "homepage.icon=pi-hole.png"
      - "homepage.href=http://192.168.1.120/admin"
      - "homepage.description=DNS Sinkhole"
    restart: unless-stopped
