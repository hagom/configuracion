services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Caracas
    volumes:
      - /home/pi/aplicaciones/configuracion/radarr:/config
      - /media/pi/Hector/Videos/Peliculas:/movies:rw
      - /media/pi/Hector/descargas:/downloads:ro
    ports:
      - 7878:7878
    restart: unless-stopped
